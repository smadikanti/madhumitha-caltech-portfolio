services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive
      POSTGRES_DB: exoplanets
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive -d exoplanets"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ARCHIVE_DATABASE_URL: postgresql+asyncpg://archive:archive@db:5432/exoplanets
      ARCHIVE_LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m archive_api.seed &&
             uvicorn archive_api.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
