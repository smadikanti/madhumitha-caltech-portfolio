apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-cd-toolkit
  labels:
    app.kubernetes.io/name: ci-cd-toolkit
    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: github-actions
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ci-cd-toolkit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ci-cd-toolkit
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: ci-cd-toolkit
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/OWNER/ci-cd-toolkit:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ci-cd-toolkit-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-cd-toolkit
  labels:
    app.kubernetes.io/name: ci-cd-toolkit
