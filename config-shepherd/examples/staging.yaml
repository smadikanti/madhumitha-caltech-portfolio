inherits: dev

app:
  debug: false
  log_level: INFO

database:
  host: staging-db.internal
  pool_size: 10
  ssl: true

cache:
  backend: redis
  host: staging-cache.internal
  port: 6379
  ttl_seconds: 120

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  cors_origins:
    - "https://staging.exoplanet-archive.caltech.edu"

software:
  packages:
    fastapi: "0.109.0"
    sqlalchemy: "2.0.25"
    pydantic: "2.5.3"
    uvicorn: "0.27.0"
    astropy: "6.0.0"
    numpy: "1.26.3"
